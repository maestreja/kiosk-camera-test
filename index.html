<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production Line Kiosk</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

.header{
background:#020617;
padding:25px;
font-size:28px;
font-weight:bold;
border-bottom:3px solid #1e293b;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:12px;
padding:40px;
font-size:22px;
cursor:pointer;
transition:0.2s;
text-decoration:none;
color:white;
}

.card:hover{
background:#334155;
transform:scale(1.05);
}

.footer{
margin-top:20px;
font-size:14px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="header">
Production Line Capture System
</div>

<div class="container">

<a class="card" href="capture.html?line=SAW">
SAW LINE
</a>

<a class="card" href="capture.html?line=FRAMING">
FRAMING LINE
</a>

<a class="card" href="capture.html?line=GLASS">
GLASS LINE
</a>

<a class="card" href="capture.html?line=WINDOW">
TERMINATED WINDOW
</a>

</div>

<div class="footer">
Select a production line to capture images
</div>

</body>
</html>
