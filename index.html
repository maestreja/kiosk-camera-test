<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kiosk Camera Upload Test</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#111;
color:white;
}

video{
width:80%;
max-width:600px;
border:3px solid white;
border-radius:8px;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
}

</style>

</head>

<body>

<h2>Kiosk Camera Test</h2>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="takePhoto()">Take Photo</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {

video.srcObject = stream;

})
.catch(err => {

alert("Camera access denied");

});

async function takePhoto(){

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.drawImage(video,0,0);

canvas.toBlob(async function(blob){

const fileName = "photo-" + Date.now() + ".png";

const uploadUrl =
"https://stusae01prodintune.blob.core.windows.net/kiosk-camera-test/"
+ fileName +
"?sp=racw&st=2026-03-10T12:38:58Z&se=2026-03-10T20:53:58Z&spr=https&sv=2024-11-04&sr=c&sig=YXAMTApkyOs5BNArS%2BEe%2B2uiCbZid5QImrbH4udFY48%3D";

try{

const response = await fetch(uploadUrl,{
method:"PUT",
headers:{
"x-ms-blob-type":"BlockBlob",
"Content-Type":"image/png"
},
body:blob
});

if(response.ok){

alert("Upload successful");

}else{

alert("Upload failed");

}

}catch(error){

alert("Upload error");

}

},"image/png");

}

</script>

</body>

</html>
