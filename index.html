<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Line Kiosk</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

.header{
background:#020617;
padding:22px 16px;
font-size:clamp(1.25rem,2.6vw,1.85rem);
font-weight:bold;
border-bottom:3px solid #1e293b;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:24px 16px;
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:12px;
padding:32px 20px;
font-size:clamp(1.1rem,2.3vw,1.4rem);
cursor:pointer;
transition:0.2s;
text-decoration:none;
color:white;
min-height:120px;
display:flex;
align-items:center;
justify-content:center;
}

.card:hover{
background:#334155;
transform:scale(1.05);
}

.footer{
margin-top:20px;
font-size:14px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="header">
Production Line Capture System
</div>

<div class="container">

<a class="card" href="capture.html?line=SAW">
SAW LINE
</a>

<a class="card" href="capture.html?line=FRAMING">
FRAMING LINE
</a>

<a class="card" href="capture.html?line=GLASS">
GLASS LINE
</a>

<a class="card" href="capture.html?line=WINDOW">
TERMINATED WINDOW
</a>

</div>

<div class="footer">
Select a production line to capture images
</div>

</body>
</html>
