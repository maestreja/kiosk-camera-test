<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production Line Capture</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#111;
  color:white;
}

video{
  width:80%;
  max-width:600px;
  border:3px solid white;
  border-radius:8px;
}

img{
  width:80%;
  max-width:600px;
  border:3px solid #4CAF50;
  border-radius:8px;
  margin-top:20px;
}

#reader{
  width:80%;
  max-width:600px;
  margin:auto;
  margin-top:20px;
}

button, select, input{
  margin-top:20px;
  padding:15px 25px;
  font-size:18px;
  margin-right:10px;
}

input{
  width:80%;
  max-width:600px;
  box-sizing:border-box;
}

#qrResult,
#scanResult{
  margin-top:20px;
  font-size:20px;
  color:#4CAF50;
}
</style>
</head>

<body>

<h2 id="lineTitle">Production Line</h2>

<button onclick="goBack()">Back to Lines</button>

<br>

<video id="video" autoplay playsinline></video>

<br>

<label for="cameraSelect">Camera:</label>
<select id="cameraSelect" style="max-width:600px; width:80%;"></select>

<br>

<button onclick="switchCamera()">Switch Camera</button>
<button onclick="takePhoto()">Take Photo</button>
<button onclick="retakePhoto()">Retake Photo</button>
<button onclick="startQR()">Scan QR</button>

<br><br>

<input
  type="text"
  id="manualScanInput"
  placeholder="Scan or type code here and press Enter"
  autocomplete="off"
  autofocus
>

<div id="scanResult"></div>

<br><br>

<img id="preview" style="display:none">

<br>

<a id="downloadLink" style="display:none">Download Photo</a>

<div id="qrResult"></div>
<div id="reader"></div>

<canvas id="canvas" style="display:none"></canvas>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

// ---------- GET PRODUCTION LINE FROM URL ----------

const params = new URLSearchParams(window.location.search);
const line = params.get("line") || "Unknown Line";

document.getElementById("lineTitle").innerText =
"Production Line: " + line;


// ---------- BACK BUTTON ----------

function goBack(){
  window.location.href = "index.html";
}


// ---------- CAMERA VARIABLES ----------

let stream;
let currentDeviceId = null;
let qrScanner = null;

const video = document.getElementById("video");
const cameraSelect = document.getElementById("cameraSelect");
const manualScanInput = document.getElementById("manualScanInput");
const scanResult = document.getElementById("scanResult");


// ---------- MANUAL BARCODE SCAN INPUT ----------

manualScanInput.addEventListener("keydown", function(event){
  if(event.key === "Enter"){
    event.preventDefault();

    const scannedCode = manualScanInput.value.trim();

    if(scannedCode){
      scanResult.innerText = "The code is: " + scannedCode;
      manualScanInput.value = "";
    }
  }
});


// ---------- CAMERA CONTROL ----------

async function stopStream() {
  if (!stream) return;
  stream.getTracks().forEach(t => t.stop());
  stream = null;
}

async function startCamera(deviceId) {

  await stopStream();

  const constraints = {
    video: deviceId
      ? {
          deviceId: { exact: deviceId },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      : {
          facingMode: { ideal: "environment" },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
  };

  try {

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;

    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings();

    currentDeviceId = settings.deviceId || deviceId || null;

  } catch (err) {

    console.error(err);
    alert("Camera access denied or not available");

  }

}


// ---------- CAMERA LIST ----------

async function populateCameras() {

  if (!stream) await startCamera();

  const devices = await navigator.mediaDevices.enumerateDevices();
  const cams = devices.filter(d => d.kind === "videoinput");

  cameraSelect.innerHTML = "";

  cams.forEach((cam, i) => {

    const opt = document.createElement("option");

    opt.value = cam.deviceId;
    opt.textContent = cam.label || `Camera ${i + 1}`;

    cameraSelect.appendChild(opt);

  });

  if (currentDeviceId) cameraSelect.value = currentDeviceId;

  cameraSelect.onchange = async () => {
    await startCamera(cameraSelect.value);
  };

}


// ---------- SWITCH CAMERA ----------

async function switchCamera() {

  const options = Array.from(cameraSelect.options);

  if (options.length < 2) return;

  const idx = options.findIndex(o => o.value === cameraSelect.value);
  const nextIdx = (idx + 1) % options.length;

  cameraSelect.value = options[nextIdx].value;

  await startCamera(cameraSelect.value);

}


// ---------- TAKE PHOTO ----------

function takePhoto(){

  const canvas=document.getElementById("canvas");
  const context=canvas.getContext("2d");

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  context.drawImage(video,0,0);

  const image=canvas.toDataURL("image/png");

  const preview=document.getElementById("preview");

  preview.src=image;
  preview.style.display="block";

  const link=document.getElementById("downloadLink");

  link.href=image;
  link.download=line + "-" + Date.now() + ".png";

  link.innerText="Download Photo";
  link.style.display="block";

  video.pause();

}


// ---------- RETAKE PHOTO ----------

function retakePhoto(){

  const preview=document.getElementById("preview");
  preview.style.display="none";

  const link=document.getElementById("downloadLink");
  link.style.display="none";

  video.play();

}


// ---------- QR SCAN ----------

async function startQR(){

  const resultBox=document.getElementById("qrResult");
  resultBox.innerText = "";

  if (qrScanner) {

    try { await qrScanner.stop(); } catch(e) {}

    qrScanner = null;

    document.getElementById("reader").innerHTML = "";

  }

  qrScanner = new Html5Qrcode("reader");

  const selectedDeviceId = cameraSelect.value || currentDeviceId;

  const cameraConfig = selectedDeviceId
    ? { deviceId: { exact: selectedDeviceId } }
    : { facingMode: "environment" };

  qrScanner.start(
    cameraConfig,
    { fps: 10, qrbox: 250 },
    async (qrCodeMessage) => {

      resultBox.innerText = "QR Code: " + qrCodeMessage;

      try { await qrScanner.stop(); } catch(e) {}

      qrScanner = null;

    },
    (_errorMessage) => {}
  );

}


// ---------- INIT ----------

(async function init(){

  await startCamera();

  await populateCameras();

  navigator.mediaDevices.addEventListener?.("devicechange", populateCameras);

  manualScanInput.focus();

})();

</script>

</body>
</html>
