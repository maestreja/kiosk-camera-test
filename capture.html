    <script>
        function backToLines() {
            const currentUrl = new URL(window.location.href);
            const lineParam = currentUrl.searchParams.get("line");
            if (lineParam) {
                window.location.href = `index.html?line=${lineParam}`;
            } else {
                window.location.href = 'index.html';
            }
