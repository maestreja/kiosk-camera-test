<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Line Capture</title>

<style>

body{
  font-family:Arial,sans-serif;
  text-align:center;
  background:#111;
  color:white;
  margin:0;
}

.page{
  max-width:900px;
  margin:0 auto;
  padding:20px 16px 28px;
}

.stage,
.field-row,
.top-controls,
.action-grid,
#manualScanInput{
  width:min(92vw,640px);
}

h2{
  margin:8px 0 20px;
  font-size:clamp(1.4rem,2.5vw,2rem);
}

video{
  width:100%;
  border:3px solid white;
  border-radius:8px;
  display:block;
  margin:auto;
}

#preview{
  width:100%;
  border:3px solid #4CAF50;
  border-radius:8px;
  margin:20px auto 0;
}

#reader{
  width:100%;
  aspect-ratio:1/1;
  margin:auto;
  margin-top:20px;
  display:none;
  border:3px solid #4CAF50;
  border-radius:8px;
  overflow:hidden;
  background:#000;
  position:relative;
}

#reader video{
  width:100% !important;
  height:100% !important;
  object-fit:cover;
}

#reader__scan_region,
#reader__scan_region img,
#reader__scan_region video{
  width:100% !important;
  height:100% !important;
  object-fit:cover;
}

#reader__dashboard{
  padding:8px 10px;
}

#reader__dashboard_section_csr,
#reader__dashboard_section_swaplink,
#reader__dashboard_section_fsr{
  display:none;
}

.controls{
  margin:18px auto 0;
}

.stage{
  margin:0 auto;
}

.top-controls{
  margin:0 auto;
}

.field-row{
  margin:18px auto 0;
  text-align:left;
}

.field-row label{
  display:block;
  margin-bottom:8px;
  font-size:1rem;
}

.controls{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}

.action-grid{
  margin:18px auto 0;
}

button, select, input{
  padding:14px 16px;
  font-size:clamp(1rem,2.2vw,1.15rem);
  border-radius:10px;
  border:1px solid #2f2f2f;
  box-sizing:border-box;
}

button{
  width:100%;
  margin:0;
  cursor:pointer;
}

select,
input{
  width:100%;
}

input{
  margin-top:18px;
}

#scanGuideText{
  display:none;
  margin:10px auto 0;
  color:#a7f3d0;
  font-size:clamp(0.95rem,2vw,1.1rem);
}

#reader.scanning::before{
  content:"";
  position:absolute;
  inset:14px;
  border:3px dashed rgba(76,175,80,0.95);
  border-radius:12px;
  z-index:3;
  pointer-events:none;
}

#reader.scanning::after{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:10px;
  z-index:4;
  pointer-events:none;
  background:
    linear-gradient(#4CAF50,#4CAF50) top left/42px 4px no-repeat,
    linear-gradient(#4CAF50,#4CAF50) top left/4px 42px no-repeat,
    linear-gradient(#4CAF50,#4CAF50) top right/42px 4px no-repeat,
    linear-gradient(#4CAF50,#4CAF50) top right/4px 42px no-repeat,
    linear-gradient(#4CAF50,#4CAF50) bottom left/42px 4px no-repeat,
    linear-gradient(#4CAF50,#4CAF50) bottom left/4px 42px no-repeat,
    linear-gradient(#4CAF50,#4CAF50) bottom right/42px 4px no-repeat,
    linear-gradient(#4CAF50,#4CAF50) bottom right/4px 42px no-repeat;
}

#reader.scan-success{
  animation:readerSuccessFlash 420ms ease-out;
}

@keyframes readerSuccessFlash{
  0%{
    box-shadow:0 0 0 0 rgba(34,197,94,0.85);
    filter:brightness(1);
  }
  50%{
    box-shadow:0 0 0 16px rgba(34,197,94,0.12);
    filter:brightness(1.16);
  }
  100%{
    box-shadow:0 0 0 0 rgba(34,197,94,0);
    filter:brightness(1);
  }
}

#qrResult,
#scanResult{
  margin-top:16px;
  font-size:clamp(1rem,2.3vw,1.25rem);
  color:#4CAF50;
}

#downloadLink{
  display:inline-block;
  margin-top:16px;
  color:#7dd3fc;
  font-size:1.05rem;
}

@media (max-width:700px){
  .controls{
    grid-template-columns:1fr;
  }
}

@media (min-width:900px) and (orientation:landscape){
  .page{
    max-width:1200px;
    padding:24px 24px 34px;
  }

  .stage,
  .field-row,
  .top-controls,
  .action-grid,
  #manualScanInput{
    width:min(72vw,920px);
  }

  video,
  #preview{
    border-width:4px;
    border-radius:12px;
  }

  #reader{
    border-width:4px;
    border-radius:12px;
    max-height:70vh;
  }

  .action-grid{
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
  }

  .action-grid button{
    min-height:64px;
    font-size:1.2rem;
  }
}

</style>
</head>

<body>

<main class="page">

<h2 id="lineTitle">Production Line</h2>

<div class="controls top-controls">
<button onclick="goBack()">Back to Lines</button>
</div>

<div class="stage">
<video id="video" autoplay playsinline></video>

<div id="reader"></div>

<div id="scanGuideText">Align the QR code inside the frame corners</div>
</div>

<div class="field-row">
<label for="cameraSelect">Camera:</label>
<select id="cameraSelect"></select>
</div>

<div class="controls action-grid">
<button onclick="switchCamera()">Switch Camera</button>
<button onclick="takePhoto()">Take Photo</button>
<button onclick="retakePhoto()">Retake Photo</button>
<button onclick="startQR()">Scan QR</button>
</div>

<input
type="text"
id="manualScanInput"
placeholder="Scan or type code here and press Enter"
autocomplete="off"
>

<div id="scanResult"></div>

<img id="preview" style="display:none">

<a id="downloadLink" style="display:none">Download Photo</a>

<div id="qrResult"></div>

<canvas id="canvas" style="display:none"></canvas>

</main>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const params = new URLSearchParams(window.location.search);
const line = params.get("line") || "Unknown Line";

document.getElementById("lineTitle").innerText =
"Production Line: " + line;

function goBack(){
  window.location.href = "index.html";
}

let stream;
let currentDeviceId=null;
let qrScanner=null;
let isHandlingQrResult=false;

const video=document.getElementById("video");
const reader=document.getElementById("reader");
const cameraSelect=document.getElementById("cameraSelect");

const manualScanInput=document.getElementById("manualScanInput");
const scanResult=document.getElementById("scanResult");
const scanGuideText=document.getElementById("scanGuideText");

manualScanInput.addEventListener("keydown",function(event){

if(event.key==="Enter"){

event.preventDefault();

const scannedCode=manualScanInput.value.trim();

if(scannedCode){

scanResult.innerText="The code is: "+scannedCode;

manualScanInput.value="";

}

}

});

async function stopStream(){

if(!stream) return;

stream.getTracks().forEach(t=>t.stop());

stream=null;

}

async function startCamera(deviceId){

await stopStream();

reader.style.display="none";
reader.classList.remove("scanning","scan-success");
scanGuideText.style.display="none";
video.style.display="block";

const constraints={
video:deviceId
?{
deviceId:{exact:deviceId},
width:{ideal:1920},
height:{ideal:1080}
}
:{
facingMode:{ideal:"environment"},
width:{ideal:1920},
height:{ideal:1080}
}
};

try{

stream=await navigator.mediaDevices.getUserMedia(constraints);

video.srcObject=stream;

const track=stream.getVideoTracks()[0];

const settings=track.getSettings();

currentDeviceId=settings.deviceId||deviceId||null;

}catch(err){

alert("Camera access denied or not available");

}

}

async function populateCameras(){

if(!stream) await startCamera();

const devices=await navigator.mediaDevices.enumerateDevices();

const cams=devices.filter(d=>d.kind==="videoinput");

cameraSelect.innerHTML="";

cams.forEach((cam,i)=>{

const opt=document.createElement("option");

opt.value=cam.deviceId;

opt.textContent=cam.label||`Camera ${i+1}`;

cameraSelect.appendChild(opt);

});

if(currentDeviceId) cameraSelect.value=currentDeviceId;

cameraSelect.onchange=async()=>{

await startCamera(cameraSelect.value);

};

}

async function switchCamera(){

const options=Array.from(cameraSelect.options);

if(options.length<2) return;

const idx=options.findIndex(o=>o.value===cameraSelect.value);

const nextIdx=(idx+1)%options.length;

cameraSelect.value=options[nextIdx].value;

await startCamera(cameraSelect.value);

}

function takePhoto(){

const canvas=document.getElementById("canvas");

const context=canvas.getContext("2d");

canvas.width=video.videoWidth;

canvas.height=video.videoHeight;

context.drawImage(video,0,0);

const image=canvas.toDataURL("image/png");

const preview=document.getElementById("preview");

preview.src=image;

preview.style.display="block";

const link=document.getElementById("downloadLink");

link.href=image;

link.download=line+"-"+Date.now()+".png";

link.innerText="Download Photo";

link.style.display="block";

video.pause();

}

function retakePhoto(){

const preview=document.getElementById("preview");

preview.style.display="none";

const link=document.getElementById("downloadLink");

link.style.display="none";

video.play();

}

async function startQR(){

const resultBox=document.getElementById("qrResult");

resultBox.innerText="";

await stopStream();

video.style.display="none";

reader.style.display="block";
reader.classList.add("scanning");
scanGuideText.style.display="block";

reader.innerHTML="";

qrScanner=new Html5Qrcode("reader");
isHandlingQrResult=false;

const selectedDeviceId=cameraSelect.value||currentDeviceId;

const cameraConfig=selectedDeviceId
?{deviceId:{exact:selectedDeviceId}}
:{facingMode:"environment"};

qrScanner.start(
cameraConfig,
{
fps:10,
qrbox:()=>{
const size=Math.max(180,Math.floor(Math.min(reader.clientWidth,reader.clientHeight)*0.7));
return { width:size, height:size };
}
},
async(qrCodeMessage)=>{

if(isHandlingQrResult) return;
isHandlingQrResult=true;

resultBox.innerText="QR Code: "+qrCodeMessage;

reader.classList.remove("scanning");
reader.classList.add("scan-success");
scanGuideText.style.display="none";

await new Promise(resolve=>setTimeout(resolve,280));

await qrScanner.stop();

qrScanner=null;

reader.style.display="none";

await startCamera(cameraSelect.value);

},
(_errorMessage)=>{}
);

}

(async function init(){

await startCamera();

await populateCameras();

navigator.mediaDevices.addEventListener?.("devicechange",populateCameras);


})();

</script>

</body>
</html>
